slug: set-a-boundary
title: Set a Boundary
category: relationships-and-care
description: >-
  Define, phrase, and rehearse a personal boundary for family, friends, work, dating, or shared
  living. Use when the user needs to say no, limit contact or availability, respond to repeated
  pressure, and plan follow-through without over-explaining.
outcome: A concise boundary script, pushback rehearsal, and follow-through plan.
examples:
  - Help me say I cannot answer work messages at night.
  - Rehearse how to decline repeated family requests.
  - Make this boundary clear without sounding hostile.
tags:
