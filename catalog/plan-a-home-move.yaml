title: Plan a Home Move
category: life-administration
description: >-
  Plan a household move around real dates, people, pets, utilities, packing, vendors, handover,
  travel, and first-night needs. Use when the user is moving home and needs one coordinated timeline
  rather than disconnected packing tips.
outcome: A dated command plan, ownership map, essentials system, and moving-day fallback.
examples:
  - We move in six weeks; build the plan.
  - What should stay out of the moving boxes?
  - Coordinate a move between two cities.
