slug: cool-down-an-angry-message
title: Cool Down an Angry Message
category: relationships-and-care
description: >-
  Decide whether to send, delay, shorten, or replace an angry text, email, or direct message. Use
  when the user has drafted an emotionally charged message and wants to preserve the real request or
  boundary without insults, threats, topic stacking, or irreversible escalation.
outcome: A send/delay/talk decision, a de-escalated draft, and a plan for the underlying issue.
examples:
  - Should I send this angry text tonight?
  - Keep my point but remove the escalation.
  - Turn this long message into a request for a conversation.
tags:
  - angry text
  - message
  - conflict
  - cooldown
  - communication
