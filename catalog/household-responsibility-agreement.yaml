slug: household-responsibility-agreement
title: Household responsibility agreement
category: relationships-and-care
description: >-
  Turn recurring household conflict into explicit ownership, frequency, minimum standards, handoff
  rules, and a review date. Use to account for invisible planning and monitoring work as well as
  visible chores.
outcome: A shared ownership agreement with standards, handoffs, exceptions, and a review date.
examples:
  - We keep arguing about who notices the chores.
  - Define what 'clean enough' means for both of us.
  - Split ownership without making one person the manager.
tags:
  - chores
  - household
  - mental load
  - agreement
  - shared responsibility
