slug: return-refund-escalation
title: Return and refund escalation
category: money-and-consumer
description: >-
  Organize receipts, promises, policy text, and contact history into a calm, dated escalation
  sequence. Use for consumer communication after asking the country or region; avoid unsupported
  legal claims and preserve evidence at every step.
outcome: An evidence file, escalation ladder, and concise messages with deadlines.
examples:
  - The seller stopped replying about my refund.
  - Draft a calm escalation using this receipt and chat history.
  - What evidence should I preserve before I contact them again?
