title: Audit and Cancel Subscriptions
category: money-and-consumer
description: >-
  Find, review, downgrade, and cancel recurring subscriptions using actual charges, usage, renewal
  dates, and cancellation evidence. Use when the user wants to stop forgotten memberships, reduce
  recurring costs, or verify that a cancellation really took effect.
outcome: A keep/cancel/review table, ordered cancellation plan, and verification checklist.
examples:
