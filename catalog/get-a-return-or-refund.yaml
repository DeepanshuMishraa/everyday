slug: get-a-return-or-refund
title: Get a Return or Refund
category: money-and-consumer
description: >-
  Organize a return, missing refund, damaged order, or service complaint into a calm evidence-based
  escalation. Use when the user needs to preserve receipts and promises, write a clear message,
  track contact history, and choose the next consumer channel for their country.
outcome: An evidence file, escalation ladder, and concise messages with deadlines.
examples:
  - The seller stopped replying about my refund.
  - Draft a calm escalation using this receipt and chat history.
  - What evidence should I preserve before I contact them again?
