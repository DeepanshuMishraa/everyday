slug: weekly-life-reset
title: Weekly life reset
category: life-administration
description: >-
  Run a bounded weekly review across calendar, home, food, money, relationships, and unfinished
  commitments. Use when someone needs a realistic next-week plan rather than a motivational speech
  or an unprioritized master list.
outcome: A short review, resolved loose ends, and a capacity-aware plan for the next seven days.
examples:
  - Help me reset for next week in 20 minutes.
  - My calendar and chores are getting away from me.
  - Turn these loose ends into a realistic week.
tags:
  - weekly review
  - planning
  - calendar
  - life admin
  - reset
