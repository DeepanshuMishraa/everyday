slug: apology-and-repair
title: Apology and repair
category: relationships-and-care
description: >-
  Craft an accountable apology that names the action and impact, removes excuses, proposes
  proportionate repair, and identifies the behavior that must change afterward. Use when the goal is
  genuine accountability, not image management or pressured reconciliation.
outcome: A direct apology, repair offer, and concrete change commitment.
examples:
  - I missed an important commitment; help me apologize.
  - Remove the excuses from this message.
  - What repair should happen after I say sorry?
tags:
  - apology
  - repair
  - accountability
  - conflict
  - relationship
