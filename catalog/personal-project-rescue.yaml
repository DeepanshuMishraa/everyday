slug: personal-project-rescue
title: Personal project rescue
category: decisions-learning-travel
description: >-
  Recover a stalled personal project by reconstructing context, locating the actual blockage,
  cutting scope, and defining one finishable milestone. Use when the project still matters but
  momentum and working memory have decayed.
outcome: A recovered context brief, blockage diagnosis, reduced scope, and next finishable milestone.
examples:
  - I abandoned this project three months ago; help me restart.
  - Cut this hobby project to something finishable.
  - Figure out whether I am blocked by uncertainty or effort.
tags:
  - project
  - stuck
  - restart
  - scope
  - milestone
