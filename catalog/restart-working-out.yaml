slug: restart-working-out
title: Restart Working Out
category: sustainable-health
description: >-
  Restart gym, running, sport, or home exercise after weeks or months away with a deliberately easy,
  repeatable plan. Use when the user says they missed workouts, lost fitness or confidence, and
  wants a conservative return rather than injury rehabilitation or medical clearance.
outcome: A conservative two-week restart with minimums, progression criteria, and stop conditions.
examples:
  - I missed my workouts for two months; help me restart.
  - Make week one intentionally easy.
  - I used to run regularly but have lost the habit.
tags:
  - exercise
  - restart
  - missed workouts
  - fitness
  - routine
