slug: learn-by-doing
title: Learn by Doing
category: decisions-learning-travel
description: >-
  Teach the user a practical skill through a short explanation, worked example, guided attempt,
  independent attempt, feedback, and later retrieval. Use when the user wants to learn by practice
  instead of receiving a reading list, and when progress should continue across multiple sessions in
  the current workspace.
outcome: A practice sequence with a real attempt, feedback criteria, and spaced retrieval prompts.
examples:
  - Teach me this by making me try it.
  - Turn this topic into a 30-minute practice session.
  - Do not give me the answer until I attempt it.
tags:
  - learning
  - practice
  - study
  - retrieval
  - example
