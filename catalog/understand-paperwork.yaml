slug: understand-paperwork
title: Understand Paperwork
category: life-administration
description: >-
  Explain a form, official letter, application, bill, or administrative notice in plain language.
  Use when the user needs to know what a document asks for, which dates and documents matter, what
  remains unclear, and how to complete or respond without receiving legal conclusions.
outcome: A plain-language brief, document checklist, deadlines, and questions for the issuing body.
examples:
  - What is this letter actually asking me to do?
  - Turn this application into a checklist.
  - Which documents am I missing before I submit?
tags:
  - paperwork
  - form
  - letter
  - deadline
  - documents
