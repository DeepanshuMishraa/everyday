title: Plan a Gathering
category: food-and-home
description: >-
  Plan a dinner, party, or small gathering without last-minute panic. Use when the user needs a
  guest-aware menu, shopping and preparation timeline, seating or space plan, division of work,
  dietary handling, and fallbacks built backward from arrival time.
outcome: A backward timeline, menu and shopping plan, division of work, and fallbacks.
examples:
  - Eight people are coming Saturday; where do I start?
  - Plan a dinner for mixed dietary needs.
  - I have one oven and two hours after work.
