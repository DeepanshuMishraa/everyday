slug: scam-message-check
title: Scam message check
category: money-and-consumer
description: >-
  Assess a suspicious email, text, listing, or request for impersonation, urgency, payment,
  credential, attachment, and link risks. Use to produce independent verification steps without
  clicking, replying, calling supplied numbers, or declaring certainty from limited evidence.
outcome: A risk assessment, suspicious signals, safe verification route, and account-protection steps.
examples:
  - Is this suspicious text from my bank real?
  - A buyer wants me to pay a courier first.
  - Check this urgent password-reset email without opening the link.
tags:
  - scam
  - phishing
  - suspicious text
  - fraud
  - verification
