slug: moving-home-command-center
title: Moving-home command center
category: life-administration
description: >-
  Create a dated moving plan that coordinates utilities, address changes, packing zones, essential
  items, vendors, handover, travel day, and first-night setup. Use when a move has a real date and
  several interdependent workstreams.
outcome: A dated command plan, ownership map, essentials system, and moving-day fallback.
examples:
  - We move in six weeks; build the plan.
  - What should stay out of the moving boxes?
  - Coordinate a move between two cities.
tags:
  - moving
  - packing
  - utilities
  - address change
  - handover
