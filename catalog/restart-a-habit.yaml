slug: restart-a-habit
title: Restart a Habit
category: sustainable-health
description: >-
  Restart a routine after missed days or a longer break by finding why it failed, shrinking it, and
  creating a recovery rule. Use when the user feels ashamed about losing a habit, keeps starting
  over, or needs consistency without streak pressure or all-or-nothing thinking.
outcome: A failure diagnosis, smaller restart protocol, recovery rule, and review date.
examples:
  - I broke my routine and cannot get going again.
  - Make this habit smaller without making it meaningless.
  - Help me avoid quitting after one missed day.
tags:
  - habit
  - routine
  - restart
  - consistency
  - streak
