slug: travel-day-contingency
title: Travel-day contingency
category: decisions-learning-travel
description: >-
  Audit a specific travel day for transfer buffers, documents, connectivity, medications, payments,
  delays, lost luggage, and missed connections. Use to create an offline fallback brief; verify
  current operator and border information from authoritative sources.
outcome: A risk-audited timeline and compact offline fallback brief for disruptions.
examples:
  - Audit this itinerary for a tight connection.
  - What should I save offline before the trip?
  - Make a plan for delayed bags and a missed last train.
tags:
  - travel day
  - flight
  - connection
  - delay
  - offline
