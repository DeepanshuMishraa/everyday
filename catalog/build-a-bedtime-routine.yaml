slug: build-a-bedtime-routine
title: Build a Bedtime Routine
category: sustainable-health
description: >-
  Build a small, realistic evening wind-down and bedtime routine around the user's actual schedule,
  phone habits, household duties, light, noise, and variable nights. Use for routine design, not
  diagnosis or treatment of insomnia or other sleep disorders.
outcome: A seven-night wind-down experiment with cues, reduced friction, and a review measure.
examples:
  - I keep scrolling long after I meant to sleep.
  - Build a 20-minute wind-down I can actually keep.
  - My evenings are unpredictable; design a flexible routine.
