slug: coordinate-family-care
title: Coordinate Family or Pet Care
category: relationships-and-care
description: >-
  Coordinate non-clinical support for a child, older relative, recovering family member, disabled
  person, or pet. Use when several people need a shared schedule, responsibilities, supplies,
  transport, questions, and reliable handoffs without asking the agent to make medical or veterinary
  decisions.
outcome: A care coordination board, ownership map, handoff format, and question list for professionals.
examples:
  - Coordinate visits and groceries for my recovering parent.
  - Make a clear pet-care handoff for the weekend.
  - Split school pickup and supplies across three adults.
tags:
  - care
  - family
  - pet
  - handoff
  - coordination
