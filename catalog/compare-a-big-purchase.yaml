slug: compare-a-big-purchase
title: Compare a Big Purchase
category: money-and-consumer
description: >-
  Compare an expensive purchase such as a car, appliance, phone, computer, or piece of furniture
  using real needs, total ownership cost, deal-breakers, and return options. Use when feature lists
  are making a buying decision harder rather than clearer.
outcome: A decision matrix, ownership-cost view, research gaps, and a clear decision rule.
examples:
  - Help us choose between these two cars.
  - Is the premium appliance worth it for our use?
  - Build criteria before I compare laptops.
