slug: restart-a-personal-project
title: Restart a Personal Project
category: decisions-learning-travel
description: >-
  Restart a stalled hobby, creative, learning, home, or side project after context and momentum have
  faded. Use when the user needs to reconstruct what exists, decide whether the project still
  matters, cut scope, and define one finishable milestone.
outcome: A recovered context brief, blockage diagnosis, reduced scope, and next finishable milestone.
examples:
  - I abandoned this project three months ago; help me restart.
  - Cut this hobby project to something finishable.
  - Figure out whether I am blocked by uncertainty or effort.
tags:
  - project
  - stuck
  - restart
  - scope
  - milestone
