slug: decision-journal
title: Decision journal
category: decisions-learning-travel
description: >-
  Record a consequential decision, alternatives, assumptions, reversibility, uncertainty, premortem,
  and review date. Use when someone wants to improve decision quality and later distinguish a sound
  process from lucky or unlucky outcomes.
outcome: A timestamped decision record with assumptions, confidence, safeguards, and review trigger.
examples:
  - Create a journal entry for this job decision.
  - Run a premortem before I commit.
  - Help me record what I believe now so hindsight cannot rewrite it.
tags:
  - decision
  - journal
  - premortem
  - uncertainty
  - review
