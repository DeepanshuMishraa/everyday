slug: overwhelm-to-next-action
title: Overwhelm to next action
category: life-administration
description: >-
  Turn a brain dump or overwhelming situation into one bounded problem, one immediate action, and a
  short recovery sequence. Use when generating a large to-do list would increase pressure. This is
  practical organization, not crisis or mental-health care.
outcome: One stabilizing action, a tiny sequence, and an explicit not-now list.
examples:
  - I feel overwhelmed and do not know where to begin.
  - Everything feels urgent; pick the next action.
  - Help me recover the rest of today without a giant list.
tags:
  - overwhelmed
  - next step
  - brain dump
  - priorities
  - low energy
