slug: write-an-apology
title: Write an Apology
category: relationships-and-care
description: >-
  Write an accountable apology and a realistic repair plan after the user hurt someone, missed a
  commitment, or broke trust. Use when the user needs to remove excuses, acknowledge impact, offer
  repair, and state what will change without demanding forgiveness.
outcome: A direct apology, repair offer, and concrete change commitment.
examples:
  - I missed an important commitment; help me apologize.
  - Remove the excuses from this message.
  - What repair should happen after I say sorry?
tags:
  - apology
  - repair
  - accountability
  - conflict
  - relationship
