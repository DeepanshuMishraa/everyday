slug: split-household-chores
title: Split Household Chores Fairly
category: relationships-and-care
description: >-
  Divide household chores and invisible planning work between partners, relatives, roommates, or
  family members. Use when people repeatedly argue about who notices, remembers, performs, or
  follows up on home responsibilities and need an explicit fair agreement.
outcome: A shared ownership agreement with standards, handoffs, exceptions, and a review date.
examples:
  - We keep arguing about who notices the chores.
  - Define what 'clean enough' means for both of us.
  - Split ownership without making one person the manager.
tags:
  - chores
  - household
  - mental load
  - agreement
  - shared responsibility
