slug: move-more-at-your-desk
title: Move More at Your Desk
category: sustainable-health
description: >-
  Add short movement, posture changes, walking, and eye-distance breaks to a real desk-work
  schedule. Use when the user sits through long workdays or back-to-back meetings and wants
  practical movement cues without treating pain, injury, or vision problems.
outcome: A meeting-aware movement plan with tiny cues, flexible alternatives, and a review check.
examples:
  - Fit movement into a day of back-to-back meetings.
  - I forget to look away from the screen.
  - Give me quiet movement options for an office.
