slug: return-to-exercise
title: Return to exercise
category: sustainable-health
description: >-
  Create a conservative exercise restart after a lapse using current capacity, schedule, preferred
  activities, and confidence. Use only when the user is not seeking injury rehabilitation or medical
  clearance; prioritize gradual exposure and symptom-aware stopping rules.
outcome: A conservative two-week restart with minimums, progression criteria, and stop conditions.
examples:
  - I missed my workouts for two months; help me restart.
  - Make week one intentionally easy.
  - I used to run regularly but have lost the habit.
tags:
  - exercise
  - restart
  - missed workouts
  - fitness
  - routine
