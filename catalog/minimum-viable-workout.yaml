slug: minimum-viable-workout
title: Minimum viable workout
category: sustainable-health
description: >-
  Adapt an existing workout to the time, energy, equipment, and setting available while preserving
  its main training intent. Use for healthy adults seeking a shorter session; stop for pain,
  concerning symptoms, injury, pregnancy-specific, or medical needs.
outcome: A shortened session with preserved intent, clear substitutions, and a stopping rule.
examples:
  - Turn my 60-minute workout into 20 minutes.
  - I only have resistance bands today.
  - Keep the main strength work but lower the volume.
tags:
  - workout
  - gym
  - exercise
  - short session
  - equipment
