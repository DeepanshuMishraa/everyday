slug: desk-day-movement-plan
title: Desk-day movement plan
category: sustainable-health
description: >-
  Place short movement, posture-change, and eye-break opportunities around a real workday without
  disrupting meetings or presenting movement as treatment. Use for general comfort and routine;
  refer persistent pain, weakness, numbness, or concerning symptoms to a clinician.
outcome: A meeting-aware movement plan with tiny cues, flexible alternatives, and a review check.
examples:
  - Fit movement into a day of back-to-back meetings.
  - I forget to look away from the screen.
  - Give me quiet movement options for an office.
tags:
  - desk
  - movement
  - eye break
  - office
  - meetings
