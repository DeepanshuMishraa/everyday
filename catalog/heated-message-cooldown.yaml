slug: heated-message-cooldown
title: Heated-message cooldown
category: relationships-and-care
description: >-
  Decide whether an emotionally charged message should be sent, delayed, shortened, or turned into a
  conversation. Use to preserve the underlying need while removing escalation, threats,
  mind-reading, and irreversible language.
outcome: A send/delay/talk decision, a de-escalated draft, and a plan for the underlying issue.
examples:
  - Should I send this angry text tonight?
  - Keep my point but remove the escalation.
  - Turn this long message into a request for a conversation.
tags:
  - angry text
  - message
  - conflict
  - cooldown
  - communication
