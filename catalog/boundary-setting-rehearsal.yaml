slug: boundary-setting-rehearsal
title: Boundary-setting rehearsal
category: relationships-and-care
description: >-
  Define a specific interpersonal boundary, express it without over-explaining, rehearse likely
  pushback, and plan consistent follow-through. Use for ordinary relationship communication, not
  coercion, abuse intervention, or immediate safety situations requiring specialist help.
outcome: A concise boundary script, pushback rehearsal, and follow-through plan.
examples:
  - Help me say I cannot answer work messages at night.
  - Rehearse how to decline repeated family requests.
  - Make this boundary clear without sounding hostile.
tags:
  - boundary
  - communication
  - rehearsal
  - pushback
  - relationships
