title: Weeknight meal logistics
category: food-and-home
description: >-
  Build a realistic weekly meal system around the calendar, dietary needs, preparation time, and
  ingredient reuse. Use when the difficulty is coordinating several dinners and one grocery trip—not
  inventing a single recipe.
outcome: A calendar-aware meal plan, preparation schedule, and consolidated grocery list.
examples:
  - Plan four dinners around two late work nights.
  - Reuse ingredients without eating the same meal all week.
  - Make a vegetarian plan for two adults and a picky child.
