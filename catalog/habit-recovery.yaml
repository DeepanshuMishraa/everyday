slug: habit-recovery
title: Habit recovery
category: sustainable-health
description: >-
  Diagnose why a routine broke, cut unnecessary scope, and create a low-friction restart that avoids
  shame, all-or-nothing thinking, and artificial streak pressure. Use for ordinary behavior change,
  not addiction or clinical treatment.
outcome: A failure diagnosis, smaller restart protocol, recovery rule, and review date.
examples:
  - I broke my routine and cannot get going again.
  - Make this habit smaller without making it meaningless.
  - Help me avoid quitting after one missed day.
tags:
  - habit
  - routine
  - restart
  - consistency
  - streak
