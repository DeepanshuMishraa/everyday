slug: appointment-prep-brief
title: Appointment prep brief
category: life-administration
description: >-
  Prepare a concise brief for a medical, financial, educational, or professional appointment. Use to
  organize purpose, chronology, documents, questions, and desired outcomes without diagnosing,
  interpreting professional rules, or replacing qualified advice.
outcome: A one-page appointment brief with chronology, evidence, top questions, and desired outcome.
examples:
  - Help me prepare for a doctor appointment.
  - I need a clear brief for a school meeting.
  - Organize my questions before I meet the accountant.
tags:
  - appointment
  - doctor
  - meeting
  - questions
  - brief
