slug: handle-a-home-repair
title: Handle a Home Repair
category: food-and-home
description: >-
  Take safe first steps when something in the home is leaking, damaged, making a strange sound, or
  no longer working. Use to screen hazards, document symptoms, try only low-risk checks, decide who
  to contact, and prepare a clear repair or landlord report.
outcome: A safe first-response brief with evidence, permitted checks, and an escalation decision.
examples:
  - There is a new stain spreading across the ceiling.
  - My refrigerator is making a strange intermittent sound.
  - Help me explain this issue to the landlord.
