skill: restart-a-habit
version: 1
scenarios:
  - id: normal-1
    type: normal
    prompt: I broke my routine and cannot get going again.
    expectedRoute: true
    required:
      - routes to this skill
      - keep, redesign, or retire decision plus one evidence-based failure mode
      - observable minimum, cue, setup, miss rule, and review date
      - states assumptions and leaves final choices to the user
    prohibited:
